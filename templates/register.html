<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Mood Detection App</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Custom Animations -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/animations.css') }}">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        spotify: '#1DB954',
                        'dark-bg': '#121212',
                        'dark-card': '#191414',
                        'dark-input': '#282828',
                        'dark-text': '#B3B3B3',
                    },
                    fontFamily: {
                        'montserrat': ['Montserrat', 'sans-serif'],
                        'inter': ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
</head>
<body class="font-montserrat bg-dark-bg text-dark-text flex items-center justify-center min-h-screen overflow-hidden p-4">
    
    <!-- Animated Background Gradient -->
    <div class="fixed inset-0 -z-10">
        <div class="absolute inset-0 bg-gradient-to-br from-dark-bg via-dark-card to-dark-bg"></div>
        <div class="absolute top-20 -right-20 w-96 h-96 bg-spotify opacity-5 rounded-full blur-3xl animate-pulse-soft"></div>
        <div class="absolute -bottom-20 left-1/4 w-80 h-80 bg-spotify opacity-5 rounded-full blur-3xl animate-pulse-soft" style="animation-delay: 1.5s;"></div>
    </div>

    <!-- Main Container -->
    <div class="w-full max-w-2xl animate-fade-in-up">
        
        <!-- Registration Card -->
        <div class="bg-dark-card border border-dark-input/30 rounded-3xl shadow-2xl p-6 md:p-8 backdrop-blur-sm hover:border-spotify/50 transition-all duration-500 border-subtle">
            
            <!-- Header -->
            <div class="mb-6 text-center">
                <h1 class="text-3xl md:text-4xl font-bold bg-gradient-to-r from-spotify to-spotify/70 bg-clip-text text-transparent mb-2">
                    Join Mood
                </h1>
                <p class="text-dark-text text-xs md:text-sm">Discover music that matches your emotion</p>
            </div>

            <!-- Error/Success Messages -->
            {% if error %}
                <div class="animate-fade-in-down mb-6 p-4 bg-red-500/10 border border-red-500/50 rounded-lg text-red-400 text-sm text-center backdrop-blur-sm">
                    <span class="font-medium">⚠️ {{ error }}</span>
                </div>
            {% endif %}
            
            {% if success %}
                <div class="animate-fade-in-down mb-6 p-4 bg-spotify/10 border border-spotify/50 rounded-lg text-spotify text-sm text-center backdrop-blur-sm">
                    <span class="font-medium">✓ {{ success }}</span>
                </div>
            {% endif %}

            <!-- Registration Form -->
            <form method="POST" action="{{ url_for('register') }}" class="space-y-3">
                
                <!-- Username Input -->
                <div class="stagger-item">
                    <label class="block text-xs font-semibold text-dark-text/70 mb-1 uppercase tracking-widest">Username</label>
                    <input type="text" 
                           name="username" 
                           placeholder="Choose a unique username"
                           required
                           class="w-full px-3 py-2 bg-dark-input/40 border border-dark-input/50 text-white placeholder-dark-text/60 rounded-xl input-focus hover:border-spotify/40 hover:bg-dark-input/50 focus:border-spotify focus:bg-dark-input/60 transition-all duration-300 shadow-inner text-sm">
                </div>

                <!-- Password Input -->
                <div class="stagger-item">
                    <label class="block text-xs font-semibold text-dark-text/70 mb-1 uppercase tracking-widest">Password</label>
                    <input type="password" 
                           name="password" 
                           placeholder="Create a strong password"
                           required
                           class="w-full px-3 py-2 bg-dark-input/40 border border-dark-input/50 text-white placeholder-dark-text/60 rounded-xl input-focus hover:border-spotify/40 hover:bg-dark-input/50 focus:border-spotify focus:bg-dark-input/60 transition-all duration-300 shadow-inner text-sm">
                </div>

                <!-- Email Input -->
                <div class="stagger-item">
                    <label class="block text-xs font-semibold text-dark-text/70 mb-1 uppercase tracking-widest">Email</label>
                    <input type="email" 
                           name="email" 
                           placeholder="your.email@example.com"
                           required
                           class="w-full px-3 py-2 bg-dark-input/40 border border-dark-input/50 text-white placeholder-dark-text/60 rounded-xl input-focus hover:border-spotify/40 hover:bg-dark-input/50 focus:border-spotify focus:bg-dark-input/60 transition-all duration-300 shadow-inner text-sm">
                </div>

                <!-- Gender & Age Row -->
                <div class="grid grid-cols-2 gap-2">
                    <!-- Gender Select -->
                    <div class="stagger-item">
                        <label class="block text-xs font-semibold text-dark-text/70 mb-1 uppercase tracking-widest">Gender</label>
                        <select name="gender" 
                                required
                                class="w-full px-3 py-2 bg-dark-input/40 border border-dark-input/50 text-white rounded-xl input-focus hover:border-spotify/40 hover:bg-dark-input/50 focus:border-spotify focus:bg-dark-input/60 transition-all duration-300 cursor-pointer appearance-none shadow-inner text-sm">
                            <option value="" disabled selected>Select</option>
                            <option value="Male" class="bg-dark-card text-white">Male</option>
                            <option value="Female" class="bg-dark-card text-white">Female</option>
                            <option value="Other" class="bg-dark-card text-white">Other</option>
                        </select>
                    </div>

                    <!-- Age Input -->
                    <div class="stagger-item">
                        <label class="block text-xs font-semibold text-dark-text/70 mb-1 uppercase tracking-widest">Age</label>
                        <input type="number" 
                               name="age" 
                               placeholder="Your age"
                               min="13" 
                               max="120" 
                               required
                               class="w-full px-3 py-2 bg-dark-input/40 border border-dark-input/50 text-white placeholder-dark-text/60 rounded-xl input-focus hover:border-spotify/40 hover:bg-dark-input/50 focus:border-spotify focus:bg-dark-input/60 transition-all duration-300 shadow-inner text-sm">
                    </div>
                </div>

                <!-- Register Button -->
                <button type="submit" 
                        class="stagger-item w-full btn-flexible min-h-12 mt-4 bg-gradient-to-r from-spotify to-spotify/80 hover:to-spotify text-black font-bold text-base sm:text-lg rounded-xl shadow-lg hover-glow hover-lift transition-all duration-300 hover:shadow-spotify/50 active:scale-95">
                    <span class="inline-flex items-center justify-center gap-2">
                        Create Account
                        <span>✨</span>
                    </span>
                </button>
            </form>

            <!-- Divider -->
            <div class="my-4 flex items-center">
                <div class="flex-1 h-px bg-gradient-to-r from-transparent to-dark-input/50"></div>
                <span class="px-3 text-dark-text/50 text-xs">ALREADY REGISTERED?</span>
                <div class="flex-1 h-px bg-gradient-to-l from-transparent to-dark-input/50"></div>
            </div>

            <!-- Login Link -->
            <a href="{{ url_for('login') }}" 
               class="stagger-item block w-full py-2 px-4 text-center border border-spotify/30 text-spotify rounded-xl font-semibold hover:bg-spotify/10 hover:border-spotify transition-all duration-300 hover-lift text-sm">
                Sign In Instead
            </a>

            <!-- Footer -->
            <p class="mt-4 text-center text-xs text-dark-text/50">
                🎵 Your emotion detection & music journey starts here
            </p>
        </div>
    </div>

    <!-- Floating Elements (Decorative) -->
    <div class="fixed top-8 right-8 w-2 h-2 bg-spotify rounded-full animate-pulse opacity-50"></div>
    <div class="fixed bottom-8 left-8 w-3 h-3 bg-spotify rounded-full animate-bounce-soft opacity-30"></div>

</body>
</html>
