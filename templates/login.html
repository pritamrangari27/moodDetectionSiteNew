<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Mood Detection App</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Custom Animations -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/animations.css') }}">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        spotify: '#1DB954',
                        'dark-bg': '#121212',
                        'dark-card': '#191414',
                        'dark-input': '#282828',
                        'dark-text': '#B3B3B3',
                    },
                    fontFamily: {
                        'montserrat': ['Montserrat', 'sans-serif'],
                        'inter': ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
</head>
<body class="font-montserrat bg-dark-bg text-dark-text flex items-center justify-center min-h-screen overflow-hidden">
    
    <!-- Animated Background Gradient -->
    <div class="fixed inset-0 -z-10">
        <div class="absolute inset-0 bg-gradient-to-br from-dark-bg via-dark-card to-dark-bg"></div>
        <div class="absolute top-0 right-0 w-96 h-96 bg-spotify opacity-5 rounded-full blur-3xl animate-pulse-soft"></div>
        <div class="absolute bottom-0 left-0 w-80 h-80 bg-spotify opacity-5 rounded-full blur-3xl animate-pulse-soft" style="animation-delay: 1s;"></div>
    </div>

    <!-- Main Container -->
    <div class="w-full h-full flex items-center justify-center p-3 sm:p-4 animate-fade-in-up">
        
        <!-- Login Card -->
        <div class="bg-dark-card border border-dark-input/30 rounded-2xl sm:rounded-3xl shadow-2xl p-4 sm:p-6 md:p-8 backdrop-blur-sm hover:border-spotify/50 transition-all duration-500 border-subtle w-full max-w-md">
            
            <!-- Header -->
            <div class="mb-4 sm:mb-6 text-center">
                <h1 class="text-3xl sm:text-4xl font-bold bg-gradient-to-r from-spotify to-spotify/70 bg-clip-text text-transparent mb-2">
                    Mood
                </h1>
                <p class="text-dark-text text-xs sm:text-sm px-2">Detect your emotion & get personalized music</p>
            </div>

            <!-- Error/Success Messages -->
            {% if error %}
                <div class="animate-fade-in-down mb-4 sm:mb-6 p-3 sm:p-4 bg-red-500/10 border border-red-500/50 rounded-lg text-red-400 text-xs sm:text-sm text-center backdrop-blur-sm">
                    <span class="font-medium"><i class="fas fa-exclamation-circle me-2"></i>{{ error }}</span>
                </div>
            {% endif %}
            
            {% if success %}
                <div class="animate-fade-in-down mb-4 sm:mb-6 p-3 sm:p-4 bg-spotify/10 border border-spotify/50 rounded-lg text-spotify text-xs sm:text-sm text-center backdrop-blur-sm">
                    <span class="font-medium"><i class="fas fa-check-circle me-2"></i>{{ success }}</span>
                </div>
            {% endif %}

            <!-- Login Form -->
            <form method="POST" action="{{ url_for('login') }}" class="space-y-2 sm:space-y-3">
                
                <!-- Username Input -->
                <div class="group stagger-item">
                    <label class="block text-xs font-semibold text-dark-text/70 mb-1 sm:mb-1 uppercase tracking-widest">Username</label>
                    <input type="text" 
                           name="username" 
                           placeholder="Enter your username"
                           required
                           class="w-full px-3 sm:px-4 py-2 sm:py-3 bg-dark-input/40 border border-dark-input/50 text-white placeholder-dark-text/60 rounded-lg sm:rounded-xl input-focus hover:border-spotify/40 hover:bg-dark-input/50 focus:border-spotify focus:bg-dark-input/60 transition-all duration-300 shadow-inner text-sm sm:text-base">
                </div>

                <!-- Password Input -->
                <div class="group stagger-item">
                    <label class="block text-xs font-semibold text-dark-text/70 mb-1 sm:mb-1 uppercase tracking-widest">Password</label>
                    <input type="password" 
                           name="password" 
                           placeholder="Enter your password"
                           required
                           class="w-full px-3 sm:px-4 py-2 sm:py-3 bg-dark-input/40 border border-dark-input/50 text-white placeholder-dark-text/60 rounded-lg sm:rounded-xl input-focus hover:border-spotify/40 hover:bg-dark-input/50 focus:border-spotify focus:bg-dark-input/60 transition-all duration-300 shadow-inner text-sm sm:text-base">
                </div>

                <!-- Login Button -->
                <button type="submit" 
                        class="stagger-item w-full btn-flexible mt-3 sm:mt-4 bg-gradient-to-r from-spotify to-spotify/80 hover:to-spotify text-black font-bold rounded-lg sm:rounded-xl shadow-lg hover-glow hover-lift transition-all duration-300 hover:shadow-spotify/50 active:scale-95">
                    <span class="inline-flex items-center justify-center gap-2">
                        Sign In
                        <span>→</span>
                    </span>
                </button>
            </form>

            <!-- Divider -->
            <div class="my-3 sm:my-4 flex items-center gap-2">
                <div class="flex-1 h-px bg-gradient-to-r from-transparent to-dark-input/50"></div>
                <span class="px-2 text-dark-text/50 text-xs">NEW HERE?</span>
                <div class="flex-1 h-px bg-gradient-to-l from-transparent to-dark-input/50"></div>
            </div>

            <!-- Register Link -->
            <a href="{{ url_for('register') }}" 
               class="stagger-item block w-full py-2 sm:py-3 px-3 sm:px-4 text-center border border-spotify/30 text-spotify rounded-lg sm:rounded-xl font-semibold hover:bg-spotify/10 hover:border-spotify transition-all duration-300 hover-lift text-xs sm:text-sm">
                Create Account
            </a>

            <!-- Footer -->
            <p class="mt-3 sm:mt-4 text-center text-xs text-dark-text/50">
                🎭 Experience emotion detection powered by AI
            </p>
        </div>
    </div>

    <!-- Floating Elements (Decorative) -->
    <div class="fixed top-8 left-8 w-2 h-2 bg-spotify rounded-full animate-pulse opacity-50"></div>
    <div class="fixed bottom-8 right-8 w-3 h-3 bg-spotify rounded-full animate-bounce-soft opacity-30"></div>

</body>
</html>
